#
# Builds a stable release package based on a release assembly
# customisation-<version>-<increment>
#
# As soon as a package is deployed to production, the tag and the branch
# MUST STAY FOR 2 years and not deleted.
#
# Release packages, tags and customisation branches not delivered to production should
# be deleted asap a newer release is available.
#


name: MCLOUD custom server release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Release increment'
        required: true
        type: number

jobs:
  assemble-custom:
    uses: nextmcloud/.github/.github/workflows/nmc-custom-assembly.yml@nmc/2028-custom-build-28
    with:
      trunk: 'master'
      stable: ${{ vars.CUSTOM_BRANCH_28 || 'stable28' }}
      result: ${{ format('customisation-{0}-{1}', vars.CUSTOM_BRANCH_28 || 'nmcstable/28.0.3', inputs.increment ) }}
    secrets: inherit
  build-custom:
    uses: nextmcloud/.github/.github/workflows/nmc-custom-server-build.yml@nmc/2028-build-28
    needs: assemble-custom
    with:
      stable: ${{ vars.CUSTOM_BRANCH || 'stable28' }}
      assembly: ${{ format('customisation-{0}-{1}', vars.CUSTOM_BRANCH_28 || 'stable28', inputs.increment ) }}
      tag: ${{ format('{0}-{1}', vars.CUSTOM_BRANCH_28 || 'stable28' , inputs.increment) }}
      prerelease: false
    secrets: inherit
